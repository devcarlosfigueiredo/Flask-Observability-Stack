apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1

datasources:
  # ── Prometheus ──────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    orgId: 1
    uid: prometheus-uid
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      queryTimeout: "60s"
      prometheusType: Prometheus
      prometheusVersion: "2.52.0"
      cacheLevel: "High"
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo-uid
    editable: false

  # ── Loki ────────────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    orgId: 1
    uid: loki-uid
    url: http://loki:3100
    access: proxy
    isDefault: false
    jsonData:
      timeout: 60
      maxLines: 1000
      derivedFields:
        # Link trace IDs in logs to Grafana Explore
        - matcherRegex: '"trace_id":"(\w+)"'
          name: TraceID
          url: "${__value.raw}"
          datasourceUid: tempo-uid
    editable: false

  # ── Alertmanager ────────────────────────────────────────────────────────────
  - name: Alertmanager
    type: alertmanager
    orgId: 1
    uid: alertmanager-uid
    url: http://alertmanager:9093
    access: proxy
    jsonData:
      implementation: prometheus
    editable: false
